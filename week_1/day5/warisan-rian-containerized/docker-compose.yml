services: 
  db: 
    image: postgres:16
    environment: 
      POSTGRES_USER: rian
      POSTGRES_PASSWORD: passwordku123
      POSTGRES_DB: retail_analytics
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rian -d retail_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: rian 
      DB_PASSWORD: passwordku123
      DB_NAME: retail_analytics

volumes:
  postgres_data: